name: Build & Release TUI

on:
  workflow_dispatch:
  push:
    tags:
      - 'tui-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    name: TUI — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build TUI binary
        run: cargo build --release --package panex-tui --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/panex panex-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\panex.exe panex-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.target }}
          path: panex-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/panex-*
          generate_release_notes: true
